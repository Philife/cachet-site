<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Ballast">
  <!-- Ballast: a hull sitting low and stable in the water — weight below the
       waterline = low centre of gravity = steady. -->
  <defs><clipPath id="ballastClip"><circle cx="16" cy="16" r="13"/></clipPath></defs>
  <circle cx="16" cy="16" r="13" fill="none" stroke="#e6edf3" stroke-width="2.6"/>
  <g clip-path="url(#ballastClip)"><rect x="1" y="19.5" width="30" height="13" fill="#3fb950"/></g>
  <line x1="4" y1="19.5" x2="28" y2="19.5" stroke="#e6edf3" stroke-width="2.2"/>
</svg>
