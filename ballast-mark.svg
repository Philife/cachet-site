<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40" role="img" aria-label="Ballast">
  <!-- Ballast: a hull riding low and steady in the water (low centre of gravity). -->
  <defs>
    <linearGradient id="bTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5fe07a"/><stop offset="1" stop-color="#33ab4d"/>
    </linearGradient>
    <linearGradient id="bBot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#249a3f"/><stop offset="1" stop-color="#136a2a"/>
    </linearGradient>
    <clipPath id="bc"><circle cx="20" cy="20" r="16"/></clipPath>
  </defs>
  <circle cx="20" cy="20" r="16" fill="url(#bTop)"/>
  <g clip-path="url(#bc)">
    <rect x="4" y="21" width="32" height="16" fill="url(#bBot)"/>
    <ellipse cx="20" cy="13.5" rx="11" ry="6" fill="#ffffff" opacity="0.12"/>
    <rect x="4" y="20" width="32" height="2.1" fill="#eafff0" opacity="0.95"/>
  </g>
  <circle cx="20" cy="20" r="16" fill="none" stroke="#0d1117" stroke-opacity="0.18" stroke-width="1.5"/>
</svg>
